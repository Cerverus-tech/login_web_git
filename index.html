<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            font-family: 'Courier New', Courier, monospace;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card{
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 280px;
        }
        .login-card h2{
            margin-top: 0;
            text-align: center;
        }
        .from-group{
            margin-bottom: 12px;
        }
        label{
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
        }
        input{
            width: 100%;
            padding: 10px;
            box-sizing:border-box;
        }
        button{
            width: 100%;
            padding:10px;
            border: none;
            background: #007bf0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Iniciar Sesión</h2>
        <form>
            <div class="from-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" placeholder="Ingresa tu usuario" required>
            </div>
            <div class="from-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>
            <button type="submit">Ingresar</button>
        </form>
    </div>
    <h1>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Labore accusamus placeat ullam dicta omnis, fugiat, consequatur praesentium eaque hic ratione natus iusto amet qui, ipsa esse veritatis ducimus odio aspernatur.</h1>
</body>
</html>
