            font-family: 'Courier New', Courier, monospace;
            background: #f4f4f4;

            height: 100vh;
            margin: 0;
        }
        .login-card{
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);

        .login-card h2{
            margin-top: 0;
            text-align: center;
        }
        .from-group{
            margin-bottom: 12px;
        }
        label{
            display: block;
            margin-bottom: 4px;
            font-size: 14px;
        }
        input{
            width: 100%;
            padding: 10px;
            box-sizing:border-box;
        }
        button{
            width: 100%;
            padding:10px;
            border: none;
            background: #007bf0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
